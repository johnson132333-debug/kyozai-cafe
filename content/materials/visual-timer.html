<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>見えるタイマー</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background 0.4s;
  }
  body.finished { background: #dcfce7; }
  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 26px 24px;
    text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  svg { display: block; margin: 0 auto 16px; }
  .status { font-size: 16px; font-weight: 700; color: #dc2626; min-height: 24px; margin-bottom: 6px; }
  .numeric { font-size: 13px; color: #94a3b8; margin-bottom: 18px; font-variant-numeric: tabular-nums; }
  .presets { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .presets button {
    flex: 1;
    min-width: 60px;
    padding: 10px;
    font-size: 14px;
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.15s ease-out;
    font-weight: 600;
  }
  .custom-row { display: flex; gap: 8px; margin-bottom: 18px; align-items: center; justify-content: center; }
  .custom-row input {
    width: 70px;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid #cbd5e1;
    font-size: 14px;
    text-align: center;
  }
  .custom-row button {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: #64748b;
    color: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .controls { display: flex; gap: 10px; }
  .controls button {
    flex: 1;
    padding: 16px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .start-btn { background: #16a34a; color: white; }
  .start-btn:disabled { background: #cbd5e1; }
  .stop-btn { background: #dc2626; color: white; }
  .stop-btn:disabled { background: #cbd5e1; }
</style>
</head>
<body id="body">
  <div class="card">
    <h1>見えるタイマー</h1>
    <svg id="disc" width="220" height="220" viewBox="0 0 220 220"></svg>
    <div class="status" id="status"></div>
    <div class="numeric" id="numeric">03:00</div>

    <div class="presets">
      <button data-sec="60">1分</button>
      <button data-sec="180">3分</button>
      <button data-sec="300">5分</button>
      <button data-sec="600">10分</button>
    </div>
    <div class="custom-row">
      <input type="number" id="customMin" min="1" max="60" placeholder="分" />
      <button id="setCustomBtn">この分数で設定</button>
    </div>

    <div class="controls">
      <button class="start-btn" id="startBtn">スタート</button>
      <button class="stop-btn" id="resetBtn" disabled>リセット</button>
    </div>
  </div>

<script>
  const disc = document.getElementById("disc");
  const statusEl = document.getElementById("status");
  const numericEl = document.getElementById("numeric");
  const startBtn = document.getElementById("startBtn");
  const resetBtn = document.getElementById("resetBtn");
  const customMin = document.getElementById("customMin");
  const setCustomBtn = document.getElementById("setCustomBtn");
  const bodyEl = document.getElementById("body");

  const NS = "http://www.w3.org/2000/svg";
  const cx = 110, cy = 110, r = 96;

  let totalSeconds = 180;
  let remaining = 180;
  let timerId = null;

  function format(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = (sec % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }

  function polarToCartesian(angleDeg) {
    const angleRad = ((angleDeg - 90) * Math.PI) / 180;
    return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
  }

  function drawDisc(ratio) {
    disc.innerHTML = "";

    const bg = document.createElementNS(NS, "circle");
    bg.setAttribute("cx", cx);
    bg.setAttribute("cy", cy);
    bg.setAttribute("r", r);
    bg.setAttribute("fill", "#f1f5f9");
    disc.appendChild(bg);

    if (ratio > 0) {
      const angle = ratio * 360;
      if (ratio >= 0.999) {
        const full = document.createElementNS(NS, "circle");
        full.setAttribute("cx", cx);
        full.setAttribute("cy", cy);
        full.setAttribute("r", r);
        full.setAttribute("fill", "#ef4444");
        disc.appendChild(full);
      } else {
        const end = polarToCartesian(angle);
        const largeArc = angle > 180 ? 1 : 0;
        const path = document.createElementNS(NS, "path");
        const d = `M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y} Z`;
        path.setAttribute("d", d);
        path.setAttribute("fill", "#ef4444");
        disc.appendChild(path);
      }
    }

    const ring = document.createElementNS(NS, "circle");
    ring.setAttribute("cx", cx);
    ring.setAttribute("cy", cy);
    ring.setAttribute("r", r);
    ring.setAttribute("fill", "none");
    ring.setAttribute("stroke", "#cbd5e1");
    ring.setAttribute("stroke-width", "3");
    disc.appendChild(ring);
  }

  function render() {
    const ratio = totalSeconds > 0 ? remaining / totalSeconds : 0;
    drawDisc(ratio);
    numericEl.textContent = format(remaining);
  }

  function setDuration(sec) {
    if (timerId) return;
    totalSeconds = sec;
    remaining = sec;
    statusEl.textContent = "";
    bodyEl.classList.remove("finished");
    render();
  }

  document.querySelectorAll(".presets button").forEach((btn) => {
    btn.addEventListener("click", () => setDuration(Number(btn.dataset.sec)));
  });

  setCustomBtn.addEventListener("click", () => {
    const min = Number(customMin.value);
    if (min > 0) setDuration(min * 60);
  });

  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [660, 880].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(ctx.destination);
        const startAt = ctx.currentTime + i * 0.3;
        osc.start(startAt);
        gain.gain.setValueAtTime(0.15, startAt);
        gain.gain.exponentialRampToValueAtTime(0.001, startAt + 0.28);
        osc.stop(startAt + 0.3);
      });
    } catch (e) {
      // 音声再生に対応していない環境では無視する
    }
  }

  startBtn.addEventListener("click", () => {
    if (timerId || remaining <= 0) return;
    startBtn.disabled = true;
    resetBtn.disabled = false;
    statusEl.textContent = "";
    bodyEl.classList.remove("finished");
    timerId = setInterval(() => {
      remaining -= 1;
      render();
      if (remaining <= 0) {
        clearInterval(timerId);
        timerId = null;
        startBtn.disabled = false;
        statusEl.textContent = "🔔 じかんです";
        bodyEl.classList.add("finished");
        playChime();
      }
    }, 1000);
  });

  resetBtn.addEventListener("click", () => {
    clearInterval(timerId);
    timerId = null;
    remaining = totalSeconds;
    startBtn.disabled = false;
    resetBtn.disabled = true;
    statusEl.textContent = "";
    bodyEl.classList.remove("finished");
    render();
  });

  render();
</script>
</body>
</html>
