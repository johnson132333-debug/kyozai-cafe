<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>植物の成長</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 26px 20px;
    text-align: center;
  }
  h1 { font-size: 19px; margin: 0 0 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 16px 6px;
    border-radius: 14px;
    border: 3px solid #e2e8f0;
    background: #f8fafc;
    cursor: pointer;
  }
  .tile .icon { font-size: 34px; }
  .tile .label { font-size: 12px; font-weight: 700; color: #475569; }
  .tile.done { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .tile.shake { animation: shake 0.3s; border-color: #dc2626; }
  .badge {
    position: absolute;
    top: -8px;
    left: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #16a34a;
    color: white;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .status { font-size: 14px; color: #475569; margin-bottom: 10px; min-height: 20px; }
  .finished { background: #dcfce7; color: #15803d; font-weight: 700; padding: 16px; border-radius: 14px; }
  .restart-btn {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>植物の成長</h1>
    <div class="sub">育つ順番に、はやい じゅんでタップしよう</div>
    <div class="status" id="status">1ばんめは どれかな？</div>
    <div class="grid" id="grid"></div>
    <div id="finishedBox"></div>
    <button class="restart-btn" id="restartBtn">もう一度やる</button>
  </div>

<script>
  const stages = [
    { icon: "🌰", label: "たね" },
    { icon: "🌱", label: "め（発芽）" },
    { icon: "🌿", label: "くきと葉がのびる" },
    { icon: "🌻", label: "花がさく" },
    { icon: "🍅", label: "実がなる" },
  ];

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");
  const finishedBox = document.getElementById("finishedBox");
  const restartBtn = document.getElementById("restartBtn");

  let nextIndex = 0;
  let order = [];

  function shuffle(arr) {
    const a = arr.map((v, i) => i);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setup() {
    nextIndex = 0;
    order = shuffle(stages);
    status.textContent = "1ばんめは どれかな？";
    finishedBox.innerHTML = "";
    restartBtn.style.display = "none";
    grid.innerHTML = "";

    order.forEach((stageIndex) => {
      const stage = stages[stageIndex];
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.innerHTML = `<span class="icon">${stage.icon}</span><span class="label">${stage.label}</span>`;
      tile.addEventListener("click", () => handleTap(stageIndex, tile));
      grid.appendChild(tile);
    });
  }

  function handleTap(stageIndex, tileEl) {
    if (tileEl.classList.contains("done")) return;

    if (stageIndex === nextIndex) {
      tileEl.classList.add("done");
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = nextIndex + 1;
      tileEl.appendChild(badge);
      nextIndex += 1;

      if (nextIndex >= stages.length) {
        status.textContent = "";
        finishedBox.innerHTML = '<div class="finished">🌻 せいちょう かんぺき！</div>';
        restartBtn.style.display = "block";
      } else {
        status.textContent = `${nextIndex + 1}ばんめは どれかな？`;
      }
    } else {
      tileEl.classList.add("shake");
      setTimeout(() => tileEl.classList.remove("shake"), 300);
    }
  }

  restartBtn.addEventListener("click", setup);

  setup();
</script>
</body>
</html>
