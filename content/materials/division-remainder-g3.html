<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>あまりのあるわり算</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 26px 20px;
  }
  h1 { font-size: 19px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 8px; text-align: center; }
  .progress { font-size: 12px; color: #94a3b8; text-align: right; margin-bottom: 10px; }

  .prompt { text-align: center; font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 14px; }

  .groups {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
    min-height: 70px;
    align-items: flex-start;
  }
  .group-box {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    width: 58px;
    padding: 6px;
    border: 2px solid #cbd5e1;
    border-radius: 10px;
    background: #f8fafc;
  }
  .group-box.remainder { border-color: #f59e0b; background: #fffbeb; border-style: dashed; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #2563eb; }
  .group-box.remainder .dot { background: #f59e0b; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    padding: 12px 8px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .choice:hover { border-color: #93c5fd; }
  .choice.correct { border-color: #16a34a; background: #dcfce7; }
  .choice.wrong { border-color: #dc2626; background: #fee2e2; }
  .choice:disabled { cursor: default; }

  button.primary {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  button.primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .result { font-size: 16px; line-height: 1.7; text-align: center; }
  .result .score { font-size: 32px; font-weight: 700; color: #2563eb; }
</style>
</head>
<body>
  <div class="card">
    <h1>あまりのあるわり算</h1>
    <div class="sub">おはじきを分けたとき、しきと答えを選ぼう</div>
    <div class="progress" id="progress"></div>

    <div class="prompt" id="prompt"></div>
    <div class="groups" id="groups"></div>

    <div class="choices" id="choices"></div>
    <button class="primary" id="nextBtn" disabled>次へ</button>
  </div>

<script>
  const TOTAL_QUESTIONS = 6;
  const progress = document.getElementById("progress");
  const prompt = document.getElementById("prompt");
  const groupsEl = document.getElementById("groups");
  const choicesEl = document.getElementById("choices");
  const nextBtn = document.getElementById("nextBtn");

  let index = 0;
  let score = 0;
  let quotient = 0;
  let remainder = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function nextQuestion() {
    const divisor = Math.floor(Math.random() * 3) + 3; // 3〜5人ずつ
    const groupCount = Math.floor(Math.random() * 3) + 2; // 2〜4グループできる
    const total = divisor * groupCount + Math.floor(Math.random() * divisor); // あまりは0〜divisor-1
    quotient = Math.floor(total / divisor);
    remainder = total % divisor;

    prompt.textContent = `おはじき ${total}こ を、${divisor}こずつ分けると？`;
    progress.textContent = `${index + 1} / ${TOTAL_QUESTIONS} 問`;
    nextBtn.disabled = true;

    groupsEl.innerHTML = "";
    for (let g = 0; g < quotient; g++) {
      const box = document.createElement("div");
      box.className = "group-box";
      for (let i = 0; i < divisor; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        box.appendChild(dot);
      }
      groupsEl.appendChild(box);
    }
    if (remainder > 0) {
      const box = document.createElement("div");
      box.className = "group-box remainder";
      for (let i = 0; i < remainder; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        box.appendChild(dot);
      }
      groupsEl.appendChild(box);
    }

    const correctLabel = remainder > 0 ? `${quotient}こずつ　あまり${remainder}` : `${quotient}こずつ　わりきれる`;
    const optionSet = new Set([correctLabel]);
    while (optionSet.size < 4) {
      const dq = quotient + (Math.floor(Math.random() * 3) - 1);
      const dr = Math.floor(Math.random() * divisor);
      if (dq < 1) continue;
      const label = dr > 0 ? `${dq}こずつ　あまり${dr}` : `${dq}こずつ　わりきれる`;
      optionSet.add(label);
    }

    choicesEl.innerHTML = "";
    shuffle(Array.from(optionSet)).forEach((label) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.textContent = label;
      btn.addEventListener("click", () => selectChoice(label, btn, correctLabel));
      choicesEl.appendChild(btn);
    });
  }

  function selectChoice(label, btnEl, correctLabel) {
    document.querySelectorAll(".choice").forEach((btn) => {
      btn.disabled = true;
      if (btn.textContent === correctLabel) btn.classList.add("correct");
    });
    if (label !== correctLabel) btnEl.classList.add("wrong");
    else score += 1;
    nextBtn.disabled = false;
  }

  function showResult() {
    document.getElementById("prompt").style.display = "none";
    groupsEl.style.display = "none";
    choicesEl.style.display = "none";
    nextBtn.style.display = "none";

    const result = document.createElement("div");
    result.className = "result";
    result.innerHTML = `
      <div>けっか</div>
      <div class="score">${score} / ${TOTAL_QUESTIONS}</div>
      <button class="primary" id="retryBtn" style="display:block;">もう一度挑戦する</button>
    `;
    document.querySelector(".card").appendChild(result);
    document.getElementById("retryBtn").addEventListener("click", () => location.reload());
  }

  nextBtn.addEventListener("click", () => {
    index += 1;
    if (index >= TOTAL_QUESTIONS) {
      showResult();
    } else {
      nextQuestion();
    }
  });

  nextQuestion();
</script>
</body>
</html>
