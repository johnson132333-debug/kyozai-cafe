<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>動画で見くらべ・スロー再生</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    padding: 24px 16px 40px;
  }
  .wrap {
    max-width: 1000px;
    margin: 0 auto;
  }
  h1 { font-size: 21px; margin: 0 0 6px; text-align: center; }
  .lead {
    font-size: 13px;
    color: #64748b;
    text-align: center;
    max-width: 60ch;
    margin: 0 auto 8px;
    line-height: 1.7;
  }
  .privacy-note {
    font-size: 12.5px;
    color: #166534;
    background: #dcfce7;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
    max-width: 60ch;
    margin: 0 auto 22px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 720px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    padding: 16px;
  }

  .label-input {
    width: 100%;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 10px;
    border-radius: 8px;
    border: 2px solid #e2e8f0;
    margin-bottom: 10px;
    font-family: inherit;
  }
  .label-input:focus { outline: none; border-color: #2563eb; }

  .video-area {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0f172a;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .video-area video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  .video-area.has-video video { display: block; }
  .empty-state {
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 0 20px;
  }
  .video-area.has-video .empty-state { display: none; }

  .file-input { display: none; }
  .pick-btn {
    width: 100%;
    padding: 10px;
    font-size: 13.5px;
    font-weight: 700;
    border: 2px dashed #93c5fd;
    border-radius: 10px;
    background: #eff6ff;
    color: #1d4ed8;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.15s ease-out;
  }
  .pick-btn:hover { background: #dbeafe; }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .play-btn {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .play-btn:disabled { background: #cbd5e1; cursor: default; }
  .seek {
    flex: 1 1 auto;
    accent-color: #2563eb;
  }
  .time {
    flex-shrink: 0;
    font-size: 11.5px;
    color: #64748b;
    font-variant-numeric: tabular-nums;
    min-width: 78px;
    text-align: right;
  }

  .sub-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .sub-row .row-label {
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    margin-right: 2px;
  }
  .speed-btn, .frame-btn {
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border: 2px solid #e2e8f0;
    border-radius: 999px;
    background: #f8fafc;
    color: #334155;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .speed-btn:hover, .frame-btn:hover { border-color: #93c5fd; }
  .speed-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  .speed-btn:disabled, .frame-btn:disabled { opacity: 0.5; cursor: default; }

  .sync-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sync-btn {
    font-size: 14px;
    font-weight: 700;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  #syncPlayBtn { background: #16a34a; color: #fff; }
  #syncPlayBtn:hover { background: #15803d; }
  #resetBtn { background: #e2e8f0; color: #334155; }
  #resetBtn:hover { background: #cbd5e1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>動画で見くらべ・スロー再生</h1>
  <p class="lead">自分で撮った動画を2つ選んで、並べて見くらべたり、スローや1コマ送りでじっくり観察したりできます。</p>
  <p class="privacy-note">🔒 動画はこの画面の中だけで再生されます。どこにも送信・保存されません（ページを閉じると消えます）。</p>

  <div class="panels">
    <div class="panel" data-panel="a">
      <input type="text" class="label-input" value="動画①">
      <div class="video-area">
        <video playsinline></video>
        <div class="empty-state">下のボタンから動画をえらんでください</div>
      </div>
      <input type="file" class="file-input" accept="video/*">
      <button type="button" class="pick-btn">🎬 動画をえらぶ</button>
      <div class="controls-row">
        <button type="button" class="play-btn" disabled>▶ 再生</button>
        <input type="range" class="seek" min="0" max="1000" value="0" step="1" disabled>
        <span class="time">0:00 / 0:00</span>
      </div>
      <div class="sub-row">
        <span class="row-label">速さ</span>
        <button type="button" class="speed-btn active" data-speed="1" disabled>1倍</button>
        <button type="button" class="speed-btn" data-speed="0.75" disabled>0.75倍</button>
        <button type="button" class="speed-btn" data-speed="0.5" disabled>0.5倍</button>
        <button type="button" class="speed-btn" data-speed="0.25" disabled>0.25倍</button>
      </div>
      <div class="sub-row">
        <span class="row-label">1コマ送り</span>
        <button type="button" class="frame-btn" data-step="-1" disabled>◀ もどす</button>
        <button type="button" class="frame-btn" data-step="1" disabled>すすめる ▶</button>
      </div>
    </div>

    <div class="panel" data-panel="b">
      <input type="text" class="label-input" value="動画②">
      <div class="video-area">
        <video playsinline></video>
        <div class="empty-state">下のボタンから動画をえらんでください</div>
      </div>
      <input type="file" class="file-input" accept="video/*">
      <button type="button" class="pick-btn">🎬 動画をえらぶ</button>
      <div class="controls-row">
        <button type="button" class="play-btn" disabled>▶ 再生</button>
        <input type="range" class="seek" min="0" max="1000" value="0" step="1" disabled>
        <span class="time">0:00 / 0:00</span>
      </div>
      <div class="sub-row">
        <span class="row-label">速さ</span>
        <button type="button" class="speed-btn active" data-speed="1" disabled>1倍</button>
        <button type="button" class="speed-btn" data-speed="0.75" disabled>0.75倍</button>
        <button type="button" class="speed-btn" data-speed="0.5" disabled>0.5倍</button>
        <button type="button" class="speed-btn" data-speed="0.25" disabled>0.25倍</button>
      </div>
      <div class="sub-row">
        <span class="row-label">1コマ送り</span>
        <button type="button" class="frame-btn" data-step="-1" disabled>◀ もどす</button>
        <button type="button" class="frame-btn" data-step="1" disabled>すすめる ▶</button>
      </div>
    </div>
  </div>

  <div class="sync-bar">
    <button type="button" id="syncPlayBtn">⏯ 2つ同時に再生</button>
    <button type="button" id="resetBtn">⏮ 2つとも さいしょから</button>
  </div>
</div>

<script>
  const FRAME_STEP = 1 / 30; // 正確なフレームレートは取得できないため、30fps相当を仮定した近似値

  function formatTime(sec){
    if(!isFinite(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function setupPanel(panelEl){
    const video = panelEl.querySelector('video');
    const videoArea = panelEl.querySelector('.video-area');
    const fileInput = panelEl.querySelector('.file-input');
    const pickBtn = panelEl.querySelector('.pick-btn');
    const playBtn = panelEl.querySelector('.play-btn');
    const seek = panelEl.querySelector('.seek');
    const timeLabel = panelEl.querySelector('.time');
    const speedBtns = Array.from(panelEl.querySelectorAll('.speed-btn'));
    const frameBtns = Array.from(panelEl.querySelectorAll('.frame-btn'));

    let objectUrl = null;
    let seeking = false;

    function enableControls(enabled){
      playBtn.disabled = !enabled;
      seek.disabled = !enabled;
      speedBtns.forEach((b) => { b.disabled = !enabled; });
      frameBtns.forEach((b) => { b.disabled = !enabled; });
    }

    pickBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file) return;
      if(objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(file);
      video.src = objectUrl;
      videoArea.classList.add('has-video');
      enableControls(true);
      playBtn.textContent = '▶ 再生';
    });

    video.addEventListener('loadedmetadata', () => {
      seek.max = String(Math.floor(video.duration * 100));
      timeLabel.textContent = `${formatTime(0)} / ${formatTime(video.duration)}`;
    });

    video.addEventListener('timeupdate', () => {
      if(seeking) return;
      seek.value = String(Math.floor(video.currentTime * 100));
      timeLabel.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration || 0)}`;
    });

    video.addEventListener('play', () => { playBtn.textContent = '⏸ 一時停止'; });
    video.addEventListener('pause', () => { playBtn.textContent = '▶ 再生'; });
    video.addEventListener('ended', () => { playBtn.textContent = '▶ 再生'; });

    playBtn.addEventListener('click', () => {
      if(video.paused) video.play(); else video.pause();
    });

    seek.addEventListener('input', () => {
      seeking = true;
      const t = Number(seek.value) / 100;
      timeLabel.textContent = `${formatTime(t)} / ${formatTime(video.duration || 0)}`;
    });
    seek.addEventListener('change', () => {
      video.currentTime = Number(seek.value) / 100;
      seeking = false;
    });

    speedBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        const speed = Number(btn.dataset.speed);
        video.playbackRate = speed;
        speedBtns.forEach((b) => b.classList.toggle('active', b === btn));
      });
    });

    frameBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        video.pause();
        const step = Number(btn.dataset.step) * FRAME_STEP;
        video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + step));
      });
    });

    return {
      play: () => { if(video.src) video.play(); },
      reset: () => { if(video.src){ video.pause(); video.currentTime = 0; } },
    };
  }

  const panelA = setupPanel(document.querySelector('.panel[data-panel="a"]'));
  const panelB = setupPanel(document.querySelector('.panel[data-panel="b"]'));

  document.getElementById('syncPlayBtn').addEventListener('click', () => {
    panelA.play();
    panelB.play();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    panelA.reset();
    panelB.reset();
  });
</script>
</body>
</html>
