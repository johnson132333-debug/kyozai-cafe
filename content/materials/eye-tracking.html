<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>目でおいかけトレーニング</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 460px; }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 16px; text-align: center; }

  .stage-wrap {
    background: #0f172a;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
  }
  svg { display: block; width: 100%; height: 280px; }

  .panel {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
    padding: 16px;
  }
  .row-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
  .pattern-buttons { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pattern-buttons button {
    flex: 1;
    min-width: 70px;
    padding: 10px;
    font-size: 13px;
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.15s ease-out;
    font-weight: 600;
  }
  .pattern-buttons button.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

  input[type="range"] { width: 100%; margin-bottom: 14px; }

  .toggle-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #16a34a;
    color: white;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .toggle-btn.stop { background: #dc2626; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>目でおいかけトレーニング</h1>
    <div class="sub">頭を動かさず、目だけでボールを追いかけてね</div>

    <div class="stage-wrap">
      <svg id="stage" viewBox="0 0 400 280"></svg>
    </div>

    <div class="panel">
      <div class="row-label">うごきかた</div>
      <div class="pattern-buttons" id="patternButtons">
        <button data-pattern="circle" class="active">まる</button>
        <button data-pattern="horizontal">よこ</button>
        <button data-pattern="vertical">たて</button>
        <button data-pattern="figure8">8の字</button>
      </div>

      <div class="row-label">はやさ：<span id="speedLabel">ふつう</span></div>
      <input type="range" id="speedSlider" min="1" max="5" value="3" />

      <button class="toggle-btn" id="toggleBtn">スタート</button>
    </div>
  </div>

<script>
  const svg = document.getElementById("stage");
  const patternButtons = document.getElementById("patternButtons");
  const speedSlider = document.getElementById("speedSlider");
  const speedLabel = document.getElementById("speedLabel");
  const toggleBtn = document.getElementById("toggleBtn");

  const NS = "http://www.w3.org/2000/svg";
  const W = 400, H = 280;
  const cx = W / 2, cy = H / 2;
  const Rx = 150, Ry = 100;

  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  const guide = document.createElementNS(NS, "circle");
  guide.setAttribute("r", "16");
  guide.setAttribute("fill", "#f59e0b");
  guide.setAttribute("cx", cx);
  guide.setAttribute("cy", cy);
  svg.appendChild(guide);

  const speedLabels = { 1: "ゆっくり", 2: "すこしゆっくり", 3: "ふつう", 4: "すこしはやい", 5: "はやい" };

  let pattern = "circle";
  let running = false;
  let t = 0;
  let lastTime = null;
  let rafId = null;

  function positionFor(pattern, t) {
    switch (pattern) {
      case "circle":
        return { x: cx + Rx * Math.cos(t), y: cy + Ry * Math.sin(t) };
      case "horizontal":
        return { x: cx + Rx * Math.cos(t), y: cy };
      case "vertical":
        return { x: cx, y: cy + Ry * Math.sin(t) };
      case "figure8":
        return { x: cx + Rx * Math.sin(2 * t) / 1.3, y: cy + Ry * Math.sin(t) };
      default:
        return { x: cx, y: cy };
    }
  }

  function step(now) {
    if (!running) return;
    if (lastTime === null) lastTime = now;
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    const speed = Number(speedSlider.value); // 1〜5
    const angularSpeed = 0.4 + speed * 0.35;
    t += dt * angularSpeed;

    const pos = positionFor(pattern, t);
    guide.setAttribute("cx", pos.x);
    guide.setAttribute("cy", pos.y);

    rafId = requestAnimationFrame(step);
  }

  patternButtons.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-pattern]");
    if (!btn) return;
    pattern = btn.dataset.pattern;
    document.querySelectorAll(".pattern-buttons button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
  });

  speedSlider.addEventListener("input", () => {
    speedLabel.textContent = speedLabels[speedSlider.value];
  });

  toggleBtn.addEventListener("click", () => {
    running = !running;
    toggleBtn.textContent = running ? "ストップ" : "スタート";
    toggleBtn.classList.toggle("stop", running);
    if (running) {
      lastTime = null;
      rafId = requestAnimationFrame(step);
    } else if (rafId) {
      cancelAnimationFrame(rafId);
    }
  });
</script>
</body>
</html>
