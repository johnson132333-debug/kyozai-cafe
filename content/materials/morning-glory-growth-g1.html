<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>あさがおの成長をならべよう</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", -apple-system, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 26px 22px;
    text-align: center;
    position: relative;
  }
  h1 { font-size: 19px; margin: 0 0 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 18px; }

  .lane {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .slot {
    width: 76px;
    height: 76px;
    border-radius: 14px;
    border: 2px dashed #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    background: #f8fafc;
  }
  .slot.filled {
    border-style: solid;
    border-color: #6FA96B;
    background: #eaf6e8;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 8px;
  }
  .stage-card {
    border-radius: 14px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .stage-card:hover { border-color: #93c5fd; }
  .stage-card .emoji { font-size: 40px; display: block; margin-bottom: 6px; }
  .stage-card .label { font-size: 13px; font-weight: 700; color: #334155; line-height: 1.4; }
  .stage-card.placed { visibility: hidden; }
  .stage-card.shake { animation: shake 0.4s; border-color: #dc2626; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .toast {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    background: #16a34a;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .done {
    display: none;
  }
  .done.show { display: block; }
  .done h2 { font-size: 20px; color: #4F8A4B; margin: 4px 0 12px; }
  button.primary {
    margin-top: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 999px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="toast" id="toast">せいかい！</div>
    <h1>あさがおの成長をならべよう</h1>
    <div class="sub">そだつ じゅんばんに カードを タップしてね</div>

    <div class="lane" id="lane"></div>
    <div class="grid" id="grid"></div>

    <div class="done" id="done">
      <h2>🎉 ぜんぶ せいかい！</h2>
      <div>たね → め → ふたば → つる → 花 の じゅんばんで そだったね！</div>
      <button class="primary" id="retryBtn">もう一度あそぶ</button>
    </div>
  </div>

<script>
  const stages = [
    { emoji: "🌰", label: "たね" },
    { emoji: "🌱", label: "めが でる" },
    { emoji: "🍀", label: "ふたば" },
    { emoji: "🌿", label: "つるが のびる" },
    { emoji: "🌸", label: "花が さく" },
  ];

  const laneEl = document.getElementById("lane");
  const gridEl = document.getElementById("grid");
  const toastEl = document.getElementById("toast");
  const doneEl = document.getElementById("done");
  const retryBtn = document.getElementById("retryBtn");

  let order = [];
  let nextIndex = 0;
  let toastTimer = null;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderLane() {
    laneEl.innerHTML = "";
    stages.forEach((stage, i) => {
      const slot = document.createElement("div");
      slot.className = "slot" + (i < nextIndex ? " filled" : "");
      slot.textContent = i < nextIndex ? stages[i].emoji : "";
      laneEl.appendChild(slot);
    });
  }

  function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1200);
  }

  function renderGrid() {
    gridEl.innerHTML = "";
    order.forEach((stageIndex) => {
      const stage = stages[stageIndex];
      const cardEl = document.createElement("button");
      cardEl.type = "button";
      cardEl.className = "stage-card" + (stageIndex < nextIndex ? " placed" : "");
      cardEl.innerHTML = `<span class="emoji">${stage.emoji}</span><span class="label">${stage.label}</span>`;
      cardEl.addEventListener("click", () => handleTap(stageIndex, cardEl));
      gridEl.appendChild(cardEl);
    });
  }

  function handleTap(stageIndex, cardEl) {
    if (stageIndex < nextIndex) return; // already placed
    if (stageIndex === nextIndex) {
      nextIndex += 1;
      showToast("せいかい！");
      renderLane();
      cardEl.classList.add("placed");
      if (nextIndex >= stages.length) {
        setTimeout(() => {
          doneEl.classList.add("show");
        }, 500);
      }
    } else {
      cardEl.classList.remove("shake");
      void cardEl.offsetWidth;
      cardEl.classList.add("shake");
    }
  }

  function start() {
    order = shuffle(stages.map((_, i) => i));
    nextIndex = 0;
    doneEl.classList.remove("show");
    renderLane();
    renderGrid();
  }

  retryBtn.addEventListener("click", start);

  start();
</script>
</body>
</html>
