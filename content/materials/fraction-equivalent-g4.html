<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>大きさの等しい分数（4年生）</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 26px 24px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 18px; text-align: center; }

  .btn-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .btn-row button {
    padding: 8px 14px;
    font-size: 15px;
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.15s ease-out;
    font-weight: 600;
  }
  .btn-row button.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

  .rows { display: flex; flex-direction: column; gap: 12px; }
  .row-item { display: flex; align-items: center; gap: 10px; }
  .row-item .label {
    width: 56px;
    font-size: 15px;
    font-weight: 700;
    color: #1d4ed8;
    text-align: right;
    flex-shrink: 0;
  }
  .row-item .label sup, .row-item .label sub { font-size: 11px; }
  .bar-track {
    flex: 1;
    display: flex;
    height: 34px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #cbd5e1;
  }
  .bar-seg { flex: 1; border-right: 1px solid rgba(255,255,255,0.6); }
  .bar-seg:last-child { border-right: none; }
  .bar-seg.filled { background: #2563eb; }
  .bar-seg.empty { background: #e2e8f0; }

  .note { margin-top: 16px; font-size: 12px; color: #94a3b8; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <h1>大きさの等しい分数</h1>
    <div class="sub">数字はちがっても、同じ大きさになる分数を見てみよう</div>

    <div class="btn-row" id="baseButtons">
      <button data-n="1" data-d="2" class="active">1/2</button>
      <button data-n="1" data-d="3">1/3</button>
      <button data-n="2" data-d="3">2/3</button>
      <button data-n="1" data-d="4">1/4</button>
      <button data-n="3" data-d="4">3/4</button>
    </div>

    <div class="rows" id="rows"></div>
    <div class="note">すべて同じ長さの分だけ色がついています</div>
  </div>

<script>
  const baseButtons = document.querySelectorAll("#baseButtons button");
  const rows = document.getElementById("rows");

  function render(n, d) {
    rows.innerHTML = "";
    for (let k = 1; k <= 4; k++) {
      const num = n * k;
      const den = d * k;

      const row = document.createElement("div");
      row.className = "row-item";

      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML = `<sup>${num}</sup>&frasl;<sub>${den}</sub>`;
      row.appendChild(label);

      const track = document.createElement("div");
      track.className = "bar-track";
      for (let i = 0; i < den; i++) {
        const seg = document.createElement("div");
        seg.className = "bar-seg " + (i < num ? "filled" : "empty");
        track.appendChild(seg);
      }
      row.appendChild(track);

      rows.appendChild(row);
    }
  }

  baseButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      baseButtons.forEach((b) => b.classList.toggle("active", b === btn));
      render(Number(btn.dataset.n), Number(btn.dataset.d));
    });
  });

  render(1, 2);
</script>
</body>
</html>
