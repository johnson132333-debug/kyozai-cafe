<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>表情よみとりクイズ</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 440px; }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 16px; text-align: center; }
  .progress { font-size: 12px; color: #94a3b8; text-align: right; margin-bottom: 8px; }

  .face-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 30px;
    text-align: center;
    margin-bottom: 8px;
  }
  .face-card .face { font-size: 80px; }
  .question-note { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 18px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    padding: 14px 10px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    text-align: center;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .choice:hover { border-color: #93c5fd; }
  .choice.correct { border-color: #16a34a; background: #dcfce7; }
  .choice.wrong { border-color: #dc2626; background: #fee2e2; }
  .choice:disabled { cursor: default; }

  button.primary {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  button.primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .result { font-size: 16px; line-height: 1.7; text-align: center; }
  .result .score { font-size: 32px; font-weight: 700; color: #2563eb; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>表情よみとりクイズ</h1>
    <div class="sub">この顔は、どんな気持ちかな？</div>

    <div id="quiz">
      <div class="progress" id="progress"></div>
      <div class="face-card"><div class="face" id="face"></div></div>
      <div class="question-note">正しい気持ちを選んでね</div>
      <div class="choices" id="choices"></div>
      <button class="primary" id="nextBtn" disabled>次へ</button>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

<script>
  const questions = [
    { face: "😄", choices: ["うれしい", "かなしい", "おこっている", "つかれた"], answer: 0 },
    { face: "😢", choices: ["げんき", "かなしい", "びっくり", "うれしい"], answer: 1 },
    { face: "😠", choices: ["ねむい", "うれしい", "おこっている", "ふあん"], answer: 2 },
    { face: "😲", choices: ["びっくり", "たいくつ", "かなしい", "げんき"], answer: 0 },
    { face: "😴", choices: ["おこっている", "ねむい", "うれしい", "こわい"], answer: 1 },
    { face: "😨", choices: ["うれしい", "たのしい", "こわい", "げんき"], answer: 2 },
  ];

  let index = 0;
  let score = 0;
  const history = [];

  const progressEl = document.getElementById("progress");
  const faceEl = document.getElementById("face");
  const choicesEl = document.getElementById("choices");
  const nextBtn = document.getElementById("nextBtn");
  const quizEl = document.getElementById("quiz");
  const resultEl = document.getElementById("result");

  function renderQuestion() {
    const item = questions[index];
    progressEl.textContent = `${index + 1} / ${questions.length} 問`;
    faceEl.textContent = item.face;
    choicesEl.innerHTML = "";
    nextBtn.disabled = true;

    item.choices.forEach((choice, i) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.textContent = choice;
      btn.addEventListener("click", () => selectChoice(i));
      choicesEl.appendChild(btn);
    });
  }

  function selectChoice(selected) {
    const item = questions[index];
    const buttons = choicesEl.querySelectorAll(".choice");
    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === item.answer) btn.classList.add("correct");
      if (i === selected && selected !== item.answer) btn.classList.add("wrong");
    });

    const isCorrect = selected === item.answer;
    if (isCorrect) score += 1;
    history.push({ face: item.face, correct: isCorrect, correctText: item.choices[item.answer] });
    nextBtn.disabled = false;
  }

  function showResult() {
    quizEl.style.display = "none";
    resultEl.style.display = "block";
    const reviewItems = history
      .map((h) => `<li>${h.correct ? "◯" : "✕"} ${h.face} → ${h.correctText}</li>`)
      .join("");
    resultEl.innerHTML = `
      <div>けっか</div>
      <div class="score">${score} / ${questions.length}</div>
      <ul style="text-align:left;font-size:13px;color:#475569;margin-top:12px;">${reviewItems}</ul>
      <button class="primary" id="retryBtn">もういちどやる</button>
    `;
    document.getElementById("retryBtn").addEventListener("click", restart);
  }

  function restart() {
    index = 0;
    score = 0;
    history.length = 0;
    quizEl.style.display = "block";
    resultEl.style.display = "none";
    renderQuestion();
  }

  nextBtn.addEventListener("click", () => {
    index += 1;
    if (index >= questions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  });

  renderQuestion();
</script>
</body>
</html>
