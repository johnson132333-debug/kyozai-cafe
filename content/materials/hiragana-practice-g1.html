<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ひらがなよみかき</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 28px 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 20px; text-align: center; }
  .progress { font-size: 13px; color: #64748b; text-align: right; margin-bottom: 8px; }
  .emoji { display: flex; justify-content: center; margin-bottom: 6px; }
  .emoji svg { width: 84px; height: 84px; }
  .question {
    font-size: 20px;
    font-weight: 700;
    margin: 8px 0 18px;
    text-align: center;
    line-height: 1.5;
  }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    padding: 16px 10px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .choice:hover { border-color: #93c5fd; }
  .choice.correct { border-color: #16a34a; background: #dcfce7; }
  .choice.wrong { border-color: #dc2626; background: #fee2e2; }
  .choice:disabled { cursor: default; }
  button.primary {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  button.primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .result { font-size: 16px; line-height: 1.7; text-align: center; }
  .result .score { font-size: 32px; font-weight: 700; color: #2563eb; }
  .review { margin-top: 16px; font-size: 13px; color: #475569; text-align: left; }
  .review li { margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="card">
    <h1>ひらがなよみかき</h1>
    <div class="sub">えに あう ひらがなを 4つから えらぼう（ぜんぶで5もん）</div>

    <div id="quiz">
      <div class="progress" id="progress"></div>
      <div class="emoji" id="emoji"></div>
      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>
      <button class="primary" id="nextBtn" disabled>次へ</button>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

<script>
  const ICONS = {
    cat: `<svg viewBox="0 0 100 100"><path d="M25 30 L35 10 L45 32 Z" fill="#E8B84B"/><path d="M75 30 L65 10 L55 32 Z" fill="#E8B84B"/><circle cx="50" cy="55" r="32" fill="#F2C572"/><circle cx="38" cy="50" r="4" fill="#2E3440"/><circle cx="62" cy="50" r="4" fill="#2E3440"/><path d="M45 63 Q50 68 55 63" stroke="#2E3440" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M50 58 L46 61 M50 58 L54 61" stroke="#2E3440" stroke-width="2" fill="none"/><line x1="15" y1="55" x2="32" y2="53" stroke="#2E3440" stroke-width="1.5"/><line x1="15" y1="62" x2="32" y2="60" stroke="#2E3440" stroke-width="1.5"/><line x1="68" y1="53" x2="85" y2="55" stroke="#2E3440" stroke-width="1.5"/><line x1="68" y1="60" x2="85" y2="62" stroke="#2E3440" stroke-width="1.5"/></svg>`,
    dog: `<svg viewBox="0 0 100 100"><ellipse cx="25" cy="42" rx="14" ry="20" fill="#C89666" transform="rotate(-20 25 42)"/><ellipse cx="75" cy="42" rx="14" ry="20" fill="#C89666" transform="rotate(20 75 42)"/><circle cx="50" cy="56" r="30" fill="#E0B685"/><circle cx="40" cy="52" r="4" fill="#2E3440"/><circle cx="60" cy="52" r="4" fill="#2E3440"/><ellipse cx="50" cy="64" rx="6" ry="4" fill="#2E3440"/><path d="M50 68 Q46 74 40 72" stroke="#2E3440" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M55 72 Q58 78 63 76" stroke="#C0392B" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`,
    fish: `<svg viewBox="0 0 100 100"><path d="M15 50 L35 38 L35 62 Z" fill="#4F8FBF"/><ellipse cx="60" cy="50" rx="32" ry="22" fill="#5FA3D6"/><path d="M85 40 L98 30 L92 50 L98 70 L85 60 Z" fill="#4F8FBF"/><circle cx="72" cy="44" r="4" fill="#fff"/><circle cx="73" cy="44" r="2" fill="#2E3440"/><path d="M42 50 Q52 46 62 50 Q52 54 42 50" fill="#376C96" opacity="0.5"/></svg>`,
    apple: `<svg viewBox="0 0 100 100"><path d="M50 32 C30 32 20 48 20 62 C20 78 34 88 48 88 C50 88 50 86 52 86 C54 86 54 88 56 88 C70 88 82 78 82 62 C82 46 68 32 54 32 C52 32 52 34 50 34 C50 34 50 32 50 32 Z" fill="#D9483C"/><path d="M48 32 C46 24 40 20 34 20 C34 26 38 32 44 34" fill="#4F8A4B"/><line x1="50" y1="32" x2="50" y2="20" stroke="#7A5230" stroke-width="3" stroke-linecap="round"/><ellipse cx="40" cy="50" rx="7" ry="10" fill="#fff" opacity="0.25"/></svg>`,
    egg: `<svg viewBox="0 0 100 100"><path d="M50 15 C68 15 78 45 78 62 C78 80 65 90 50 90 C35 90 22 80 22 62 C22 45 32 15 50 15 Z" fill="#FBF3DD" stroke="#E8D9B0" stroke-width="2"/><ellipse cx="38" cy="42" rx="8" ry="12" fill="#fff" opacity="0.6"/></svg>`,
    watermelon: `<svg viewBox="0 0 100 100"><path d="M10 45 A40 40 0 0 1 90 45 Z" fill="#4F8A4B"/><path d="M16 45 A34 34 0 0 1 84 45 Z" fill="#DDEFD0"/><path d="M22 45 A28 28 0 0 1 78 45 Z" fill="#D9483C"/><circle cx="38" cy="35" r="2.2" fill="#2E3440"/><circle cx="50" cy="30" r="2.2" fill="#2E3440"/><circle cx="62" cy="35" r="2.2" fill="#2E3440"/></svg>`,
    umbrella: `<svg viewBox="0 0 100 100"><path d="M12 48 A38 38 0 0 1 88 48 Z" fill="#4F8FBF"/><path d="M12 48 L31 48 L31 40 Z" fill="#5FA3D6"/><path d="M50 48 L69 48 L69 40 Z" fill="#5FA3D6"/><line x1="50" y1="48" x2="50" y2="82" stroke="#7A5230" stroke-width="3"/><path d="M50 82 Q42 88 44 92" stroke="#7A5230" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`,
    moon: `<svg viewBox="0 0 100 100"><circle cx="48" cy="50" r="34" fill="#E8B84B"/><circle cx="62" cy="42" r="30" fill="#ffffff"/><circle cx="80" cy="28" r="2.5" fill="#E8B84B"/><circle cx="86" cy="45" r="1.8" fill="#E8B84B"/></svg>`,
  };

  const bank = [
    { icon: ICONS.cat, word: "ねこ", choices: ["ねこ", "ねに", "めこ", "ねさ"] },
    { icon: ICONS.dog, word: "いぬ", choices: ["いぬ", "いね", "うぬ", "いめ"] },
    { icon: ICONS.fish, word: "さかな", choices: ["さかな", "さかす", "しかな", "さすな"] },
    { icon: ICONS.apple, word: "りんご", choices: ["りんご", "りんこ", "るんご", "りむご"] },
    { icon: ICONS.egg, word: "たまご", choices: ["たまご", "たまこ", "だまご", "たすご"] },
    { icon: ICONS.watermelon, word: "すいか", choices: ["すいか", "すいが", "すゆか", "すいこ"] },
    { icon: ICONS.umbrella, word: "かさ", choices: ["かさ", "かき", "がさ", "かせ"] },
    { icon: ICONS.moon, word: "つき", choices: ["つき", "つく", "づき", "すき"] },
  ];

  const QUESTION_COUNT = 5;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let questions = [];
  let index = 0;
  let score = 0;
  const history = [];

  const progressEl = document.getElementById("progress");
  const emojiEl = document.getElementById("emoji");
  const questionEl = document.getElementById("question");
  const choicesEl = document.getElementById("choices");
  const nextBtn = document.getElementById("nextBtn");
  const quizEl = document.getElementById("quiz");
  const resultEl = document.getElementById("result");

  function buildQuestions() {
    questions = shuffle(bank).slice(0, QUESTION_COUNT).map((item) => ({
      icon: item.icon,
      word: item.word,
      displayChoices: shuffle(item.choices),
    }));
  }

  function renderQuestion() {
    const item = questions[index];
    progressEl.textContent = `${index + 1} / ${questions.length} 問`;
    emojiEl.innerHTML = item.icon;
    questionEl.textContent = `どれが「${item.word}」かな？`;
    choicesEl.innerHTML = "";
    nextBtn.disabled = true;

    item.displayChoices.forEach((choice) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.textContent = choice;
      btn.addEventListener("click", () => selectChoice(choice));
      choicesEl.appendChild(btn);
    });
  }

  function selectChoice(selected) {
    const item = questions[index];
    const buttons = choicesEl.querySelectorAll(".choice");
    buttons.forEach((btn) => {
      btn.disabled = true;
      if (btn.textContent === item.word) btn.classList.add("correct");
      if (btn.textContent === selected && selected !== item.word) btn.classList.add("wrong");
    });

    const isCorrect = selected === item.word;
    if (isCorrect) score += 1;
    history.push({ q: `「${item.word}」`, correct: isCorrect, correctText: item.word });
    nextBtn.disabled = false;
  }

  function showResult() {
    quizEl.style.display = "none";
    resultEl.style.display = "block";
    const reviewItems = history
      .map((h) => `<li>${h.correct ? "◯" : "✕"} ${h.q}（正解: ${h.correctText}）</li>`)
      .join("");
    resultEl.innerHTML = `
      <div>けっか</div>
      <div class="score">${score} / ${questions.length}</div>
      <ul class="review">${reviewItems}</ul>
      <button class="primary" id="retryBtn">もう一度挑戦する</button>
    `;
    document.getElementById("retryBtn").addEventListener("click", restart);
  }

  function restart() {
    index = 0;
    score = 0;
    history.length = 0;
    buildQuestions();
    quizEl.style.display = "block";
    resultEl.style.display = "none";
    renderQuestion();
  }

  nextBtn.addEventListener("click", () => {
    index += 1;
    if (index >= questions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  });

  buildQuestions();
  renderQuestion();
</script>
</body>
</html>
