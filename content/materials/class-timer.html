<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>授業用タイマー</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    transition: background 0.3s;
  }
  body.time-up { background: #fee2e2; }
  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 28px 24px;
    text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 18px; }
  .display {
    font-size: 56px;
    font-weight: 700;
    color: #1d4ed8;
    font-variant-numeric: tabular-nums;
    margin-bottom: 14px;
  }
  .time-up .display { color: #dc2626; }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #e2e8f0;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    width: 100%;
    transition: width 1s linear;
  }
  .presets { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .presets button {
    flex: 1;
    min-width: 60px;
    padding: 8px;
    font-size: 13px;
    border-radius: 8px;
    border: 2px solid #cbd5e1;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.15s ease-out;
    font-weight: 600;
  }
  .custom-row { display: flex; gap: 8px; margin-bottom: 18px; align-items: center; justify-content: center; }
  .custom-row input {
    width: 70px;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid #cbd5e1;
    font-size: 14px;
    text-align: center;
  }
  .custom-row button {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: #64748b;
    color: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .controls { display: flex; gap: 10px; }
  .controls button {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease-out;
  }
  .start-btn { background: #16a34a; color: white; }
  .start-btn:disabled { background: #cbd5e1; }
  .stop-btn { background: #dc2626; color: white; }
  .stop-btn:disabled { background: #cbd5e1; }
</style>
</head>
<body id="body">
  <div class="card">
    <h1>授業用タイマー</h1>
    <div class="display" id="display">03:00</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="presets">
      <button data-sec="60">1分</button>
      <button data-sec="180">3分</button>
      <button data-sec="300">5分</button>
      <button data-sec="600">10分</button>
    </div>
    <div class="custom-row">
      <input type="number" id="customMin" min="1" max="60" placeholder="分" />
      <button id="setCustomBtn">この分数で設定</button>
    </div>

    <div class="controls">
      <button class="start-btn" id="startBtn">スタート</button>
      <button class="stop-btn" id="stopBtn" disabled>リセット</button>
    </div>
  </div>

<script>
  const display = document.getElementById("display");
  const progressFill = document.getElementById("progressFill");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const customMin = document.getElementById("customMin");
  const setCustomBtn = document.getElementById("setCustomBtn");
  const bodyEl = document.getElementById("body");

  let totalSeconds = 180;
  let remaining = totalSeconds;
  let timerId = null;

  function format(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = (sec % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }

  function render() {
    display.textContent = format(remaining);
    const ratio = totalSeconds > 0 ? (remaining / totalSeconds) * 100 : 0;
    progressFill.style.width = `${ratio}%`;
  }

  function setDuration(sec) {
    if (timerId) return;
    totalSeconds = sec;
    remaining = sec;
    bodyEl.classList.remove("time-up");
    render();
  }

  document.querySelectorAll(".presets button").forEach((btn) => {
    btn.addEventListener("click", () => setDuration(Number(btn.dataset.sec)));
  });

  setCustomBtn.addEventListener("click", () => {
    const min = Number(customMin.value);
    if (min > 0) setDuration(min * 60);
  });

  startBtn.addEventListener("click", () => {
    if (timerId || remaining <= 0) return;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    bodyEl.classList.remove("time-up");
    timerId = setInterval(() => {
      remaining -= 1;
      render();
      if (remaining <= 0) {
        clearInterval(timerId);
        timerId = null;
        startBtn.disabled = false;
        bodyEl.classList.add("time-up");
      }
    }, 1000);
  });

  stopBtn.addEventListener("click", () => {
    clearInterval(timerId);
    timerId = null;
    remaining = totalSeconds;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    bodyEl.classList.remove("time-up");
    render();
  });

  render();
</script>
</body>
</html>
