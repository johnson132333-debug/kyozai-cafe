<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>かずさがしトレーニング</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 420px; }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 16px; text-align: center; }

  .size-buttons { display: flex; gap: 8px; margin-bottom: 14px; }
  .size-buttons button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    background: #ffffff;
    cursor: pointer;
    font-weight: 600;
  }
  .size-buttons button.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

  .status-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #475569;
    margin-bottom: 10px;
  }
  .status-row strong { color: #1f2937; font-size: 16px; }

  .board {
    display: grid;
    gap: 6px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 10px;
    margin-bottom: 16px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    border-radius: 10px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    color: #334155;
    cursor: pointer;
  }
  .cell.done { background: #dcfce7; border-color: #16a34a; color: #16a34a; opacity: 0.6; }
  .cell.wrong { animation: shake 0.3s; border-color: #dc2626; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .restart-btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  .cleared-banner {
    text-align: center;
    background: #dcfce7;
    color: #15803d;
    font-weight: 700;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>かずさがしトレーニング</h1>
    <div class="sub">1から じゅんばんに タップしよう</div>

    <div class="size-buttons" id="sizeButtons">
      <button data-size="3">3×3</button>
      <button data-size="4" class="active">4×4</button>
      <button data-size="5">5×5</button>
    </div>

    <div class="status-row">
      <span>つぎ：<strong id="nextNum">1</strong></span>
      <span id="timer">0.0 秒</span>
    </div>

    <div id="clearedBanner" class="cleared-banner" style="display:none;"></div>
    <div class="board" id="board"></div>
    <button class="restart-btn" id="restartBtn">もういちど（シャッフル）</button>
  </div>

<script>
  const sizeButtons = document.getElementById("sizeButtons");
  const board = document.getElementById("board");
  const nextNumEl = document.getElementById("nextNum");
  const timerEl = document.getElementById("timer");
  const restartBtn = document.getElementById("restartBtn");
  const clearedBanner = document.getElementById("clearedBanner");

  let size = 4;
  let next = 1;
  let startTime = null;
  let intervalId = null;
  let finished = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setup() {
    clearInterval(intervalId);
    startTime = null;
    finished = false;
    next = 1;
    nextNumEl.textContent = next;
    timerEl.textContent = "0.0 秒";
    clearedBanner.style.display = "none";

    const total = size * size;
    const numbers = shuffle(Array.from({ length: total }, (_, i) => i + 1));

    board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    board.innerHTML = "";
    numbers.forEach((num) => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = num;
      cell.dataset.num = num;
      cell.addEventListener("click", () => handleClick(cell, num));
      board.appendChild(cell);
    });
  }

  function handleClick(cell, num) {
    if (finished || cell.classList.contains("done")) return;

    if (startTime === null) {
      startTime = performance.now();
      intervalId = setInterval(() => {
        const elapsed = (performance.now() - startTime) / 1000;
        timerEl.textContent = `${elapsed.toFixed(1)} 秒`;
      }, 100);
    }

    if (num === next) {
      cell.classList.add("done");
      next += 1;
      nextNumEl.textContent = next;
      if (next > size * size) {
        finished = true;
        clearInterval(intervalId);
        const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
        clearedBanner.textContent = `🎉 クリア！ ${elapsed} 秒`;
        clearedBanner.style.display = "block";
      }
    } else {
      cell.classList.add("wrong");
      setTimeout(() => cell.classList.remove("wrong"), 300);
    }
  }

  sizeButtons.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-size]");
    if (!btn) return;
    size = Number(btn.dataset.size);
    document.querySelectorAll("#sizeButtons button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    setup();
  });

  restartBtn.addEventListener("click", setup);

  setup();
</script>
</body>
</html>
