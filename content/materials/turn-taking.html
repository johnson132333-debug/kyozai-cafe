<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>じゅんばんこ練習ゲーム</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
  }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 460px; }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 16px; text-align: center; }

  .score-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 700;
    color: #b45309;
    margin-bottom: 16px;
  }

  .queue {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 8px;
    border-radius: 14px;
    border: 3px solid transparent;
    background: #ffffff;
    opacity: 0.55;
    min-width: 64px;
  }
  .player .icon { font-size: 30px; }
  .player .name { font-size: 10px; color: #64748b; }
  .player.current {
    opacity: 1;
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    background: #eff6ff;
  }
  .player.current.you {
    border-color: #f59e0b;
    box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
    background: #fffbeb;
  }

  .message-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  .message-card .headline { font-size: 17px; font-weight: 700; color: #334155; }
  .message-card .sub-text { font-size: 13px; color: #94a3b8; }

  .action-btn {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease-out;
    color: white;
  }
  .action-btn.wait { background: #64748b; }
  .action-btn.your-turn { background: #f59e0b; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>じゅんばんこ練習ゲーム</h1>
    <div class="sub">じぶんの ばんが くるまで まってね</div>

    <div class="score-row">⭐ <span id="score">0</span> こ あつめた</div>

    <div class="queue" id="queue"></div>

    <div class="message-card">
      <div class="headline" id="headline"></div>
      <div class="sub-text" id="subText"></div>
    </div>

    <button class="action-btn" id="actionBtn"></button>
  </div>

<script>
  const players = [
    { icon: "🐻", name: "くまさん" },
    { icon: "🐰", name: "うさぎさん" },
    { icon: "😊", name: "きみ", isYou: true },
    { icon: "🐱", name: "ねこさん" },
    { icon: "🐶", name: "いぬさん" },
  ];

  let current = 0;
  let score = 0;

  const queueEl = document.getElementById("queue");
  const headline = document.getElementById("headline");
  const subText = document.getElementById("subText");
  const actionBtn = document.getElementById("actionBtn");
  const scoreEl = document.getElementById("score");

  function renderQueue() {
    queueEl.innerHTML = "";
    players.forEach((p, i) => {
      const el = document.createElement("div");
      el.className = "player" + (i === current ? " current" : "") + (i === current && p.isYou ? " you" : "");
      el.innerHTML = `<div class="icon">${p.icon}</div><div class="name">${p.name}</div>`;
      queueEl.appendChild(el);
    });
  }

  function renderMessage() {
    const player = players[current];
    if (player.isYou) {
      headline.textContent = "🌟 きみの番だよ！";
      subText.textContent = "タップして スターを ゲットしよう";
      actionBtn.textContent = "⭐ スターをゲット";
      actionBtn.className = "action-btn your-turn";
    } else {
      headline.textContent = `${player.icon} ${player.name} の番です`;
      subText.textContent = "じゅんばんが くるまで まっててね";
      actionBtn.textContent = "つぎの人の番にする";
      actionBtn.className = "action-btn wait";
    }
  }

  function render() {
    renderQueue();
    renderMessage();
    scoreEl.textContent = score;
  }

  actionBtn.addEventListener("click", () => {
    if (players[current].isYou) {
      score += 1;
    }
    current = (current + 1) % players.length;
    render();
  });

  render();
</script>
</body>
</html>
