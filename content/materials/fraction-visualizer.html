<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>分数ビジュアライザー</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: #f3f6fb;
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 28px 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 20px; text-align: center; }
  .fraction-label {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    color: #2563eb;
    margin-bottom: 20px;
  }
  .fraction-label sup, .fraction-label sub { font-size: 20px; }
  .controls { margin-bottom: 20px; }
  .control-row { margin-bottom: 14px; }
  .control-row label {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #475569;
    margin-bottom: 4px;
  }
  .control-row input[type="range"] { width: 100%; }
  .visuals {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  svg { display: block; }
  .bar-wrap {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  .bar-track {
    display: flex;
    width: 100%;
    height: 40px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #cbd5e1;
  }
  .bar-segment { flex: 1; border-right: 1px solid rgba(255,255,255,0.6); }
  .bar-segment:last-child { border-right: none; }
  .bar-segment.filled { background: #2563eb; }
  .bar-segment.empty { background: #e2e8f0; }
  .note { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
  <div class="card">
    <h1>分数ビジュアライザー</h1>
    <div class="sub">分子・分母を動かして分数の大きさを確認しよう</div>

    <div class="fraction-label" id="fractionLabel"></div>

    <div class="controls">
      <div class="control-row">
        <label><span>分子</span><span id="numLabel">1</span></label>
        <input type="range" id="numerator" min="0" max="12" value="1" />
      </div>
      <div class="control-row">
        <label><span>分母</span><span id="denLabel">4</span></label>
        <input type="range" id="denominator" min="1" max="12" value="4" />
      </div>
    </div>

    <div class="visuals">
      <svg id="pie" width="160" height="160" viewBox="0 0 160 160"></svg>
    </div>

    <div class="bar-wrap">
      <div class="bar-track" id="barTrack"></div>
    </div>
    <div class="note" id="decimalNote"></div>
  </div>

<script>
  const numInput = document.getElementById("numerator");
  const denInput = document.getElementById("denominator");
  const numLabel = document.getElementById("numLabel");
  const denLabel = document.getElementById("denLabel");
  const fractionLabel = document.getElementById("fractionLabel");
  const pie = document.getElementById("pie");
  const barTrack = document.getElementById("barTrack");
  const decimalNote = document.getElementById("decimalNote");

  const NS = "http://www.w3.org/2000/svg";
  const cx = 80, cy = 80, r = 70;

  function polarToCartesian(angleDeg) {
    const angleRad = ((angleDeg - 90) * Math.PI) / 180;
    return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
  }

  function render() {
    let num = Number(numInput.value);
    const den = Math.max(1, Number(denInput.value));
    if (num > den) {
      num = den;
      numInput.value = String(den);
    }
    numInput.max = String(den);

    numLabel.textContent = num;
    denLabel.textContent = den;
    fractionLabel.innerHTML = `<sup>${num}</sup>&frasl;<sub>${den}</sub>`;

    const ratio = den > 0 ? num / den : 0;
    decimalNote.textContent = `= ${ratio.toFixed(3)}（小数）`;

    // 円グラフ
    pie.innerHTML = "";
    const bg = document.createElementNS(NS, "circle");
    bg.setAttribute("cx", cx);
    bg.setAttribute("cy", cy);
    bg.setAttribute("r", r);
    bg.setAttribute("fill", "#e2e8f0");
    pie.appendChild(bg);

    if (ratio > 0) {
      if (ratio >= 1) {
        const full = document.createElementNS(NS, "circle");
        full.setAttribute("cx", cx);
        full.setAttribute("cy", cy);
        full.setAttribute("r", r);
        full.setAttribute("fill", "#2563eb");
        pie.appendChild(full);
      } else {
        const angle = ratio * 360;
        const end = polarToCartesian(angle);
        const largeArc = angle > 180 ? 1 : 0;
        const path = document.createElementNS(NS, "path");
        const d = `M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y} Z`;
        path.setAttribute("d", d);
        path.setAttribute("fill", "#2563eb");
        pie.appendChild(path);
      }
    }

    // 帯グラフ
    barTrack.innerHTML = "";
    for (let i = 0; i < den; i++) {
      const seg = document.createElement("div");
      seg.className = "bar-segment " + (i < num ? "filled" : "empty");
      barTrack.appendChild(seg);
    }
  }

  numInput.addEventListener("input", render);
  denInput.addEventListener("input", render);
  render();
</script>
</body>
</html>
